<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso | DriveNow</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Drive<span>Now</span></h1>
                <p id="form-subtitle">Entre na sua conta</p>
            </div>

            <form id="login-form" class="login-form">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember"> Lembrar de mim
                    </label>
                    <a href="#" id="forgot-password">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i>
                    Entrar
                </button>

                <div class="register-link">
                    <p>Não tem conta? <a href="#" id="show-register">Cadastre-se</a></p>
                </div>
            </form>

            <form id="register-form" class="login-form" style="display: none;">
                <div class="input-group">
                    <label for="reg-email">E-mail</label>
                    <input type="email" id="reg-email" placeholder="seu@email.com" required>
                </div>

                <div class="input-group">
                    <label for="reg-password">Crie uma Senha</label>
                    <input type="password" id="reg-password" placeholder="••••••••" required>
                </div>

                <div class="input-group">
                    <label for="reg-confirm-password">Confirme a Senha</label>
                    <input type="password" id="reg-confirm-password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-user-plus"></i>
                    Criar Conta
                </button>

                <div class="register-link">
                    <p>Já tem conta? <a href="#" id="show-login">Faça Login</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
