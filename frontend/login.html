<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso | DriveNow</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <a href="index.html" class="logo" style="text-decoration: none;">Drive<span>Now</span></a>
                <p id="form-subtitle">Bem-vindo de volta! Faça login para continuar.</p>
            </div>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="text" id="email" placeholder="seu@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Lembrar de mim
                    </label>
                    <a href="#" id="forgot-password" class="forgot-password">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Entrar</button>

                <div class="login-footer">
                    <p>Ainda não tem uma conta? <a href="#" id="show-register">Cadastre-se</a></p>
                </div>
            </form>

            <form id="register-form" class="auth-form" style="display: none;">
                <div class="form-group">
                    <label for="reg-email">E-mail</label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="reg-email" placeholder="seu@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="reg-password">Crie uma Senha</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="reg-password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="reg-confirm-password">Confirme a Senha</label>
                    <div class="input-icon">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="reg-confirm-password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Criar Conta</button>

                <div class="login-footer">
                    <p>Já possui uma conta? <a href="#" id="show-login">Faça Login</a></p>
                </div>
            </form>

        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
